name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Doc links
        run: python3 scripts/check_doc_links.py

      - name: Test
        run: cargo test --all-targets

      # 1.4 trust gates (also covered by --all-targets; named for visibility)
      - name: Trust gates (1.4)
        run: |
          cargo test --test neutrality_contract --test ambient_contract \
            --test redaction_gate --test redaction_adversarial --test redaction_store_scan \
            --test postmortem_golden --test pty_fidelity --test process_spawn_storm \
            --test fault_recovery --test overhead_smoke -- --quiet

      # 1.5 integrity gates
      - name: Integrity gates (1.5)
        run: |
          cargo test --test long_run_integrity --test tool_dedup \
            --test portable_import_atomicity --test patch_path_safety \
            --test storage_batch_faults --test workspace_checkpoint \
            --test event_ordering --test filesystem_escape \
            --test native_log_rotation --test dashboard_auth \
            --test pagination_scale --test replay_containment_linux \
            --test docs_commands -- --quiet

  # 1.5 Q1: lightweight macOS runtime gate on every PR (not only tag-time build).
  macos:
    name: macOS runtime gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Library tests
        run: cargo test --lib -- --quiet

      - name: Trust + integrity subset
        run: |
          cargo test \
            --test neutrality_contract \
            --test ambient_contract \
            --test pty_fidelity \
            --test fault_recovery \
            --test portable_import_atomicity \
            --test redaction_gate \
            --test tool_dedup \
            --test event_ordering \
            --test docs_cli_envelope \
            -- --quiet

      - name: Clippy (lib + bins)
        run: cargo clippy --all-targets -- -D warnings

  # Soft matrix note: full release binaries are built on tag via release.yml
  # (Linux x86_64/ARM64 + macOS ARM64/x86_64). Ubuntu remains primary full suite.
  qualify:
    name: release-qualify-unix (quick)
    runs-on: ubuntu-latest
    needs: [test, macos]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Unix release qualify (quick)
        run: ./scripts/release-qualify-unix.sh --quick
      - name: Upload qualification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-qualify-unix
          path: release-artifacts/
          if-no-files-found: ignore
