# Build and publish the optional MkDocs site.
# Enable GitHub Pages: Settings → Pages → Source: GitHub Actions.
#
# PRs and pushes always build + link-check. Deploy only runs on master/main.

name: Docs

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/check_doc_links.py"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
      - "README.md"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/check_doc_links.py"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: build mkdocs + link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs tools
        run: pip install -r requirements-docs.txt

      - name: Doc links (files + anchors)
        run: python3 scripts/check_doc_links.py

      - name: Prepare site (root markdown into docs/)
        run: bash scripts/prepare_docs_site.sh

      - name: Build site
        run: mkdocs build --strict -d site

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy GitHub Pages
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
