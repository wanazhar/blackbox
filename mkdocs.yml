  - Operator guides:
      - Everyday use: guide/everyday-use.md
      - Debug a failure: guide/debug-a-failure.md
      - Leave it on: guide/leave-it-on.md
      - Adapters: guide/adapters.md
      - Doctor & capture quality: guide/doctor-and-capture.md
      - Annotated examples: guide/examples.md
      - Configuration: guide/configuration.md
      - Security: guide/security.md
      - Export & sync: guide/export-and-sync.md
      - Store integrity (fsck): guide/fsck-and-integrity.md
      - Verification: guide/verification.md
      - Experiments & gates: guide/experiments.md
      - Capsules & cassettes: guide/capsules-and-cassettes.md
      - Budgets & adapters: guide/budgets-and-adapters.md
      - Overhead: guide/overhead.md
      - Troubleshooting: guide/troubleshooting.md
  - Reference:
