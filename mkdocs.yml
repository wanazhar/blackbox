# Optional local static docs site (Material for MkDocs) — not deployed.
# Source of truth: markdown under docs/ and the GitHub repo tree.
# Install: pip install -r requirements-docs.txt
# Serve:   bash scripts/prepare_docs_site.sh && mkdocs serve
# Build:   mkdocs build -d site   # local only; site/ is gitignored

site_name: blackbox docs
site_description: Flight recorder, debugger, and project memory for AI-agent runs
repo_url: https://github.com/wanazhar/blackbox
repo_name: wanazhar/blackbox
edit_uri: edit/master/docs/
docs_dir: docs
site_dir: site

extra:
  generator: false

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

exclude_docs: |
  plan/adoption-1.1.md
  plan/agent-memory-bus-1.2.md
  plan/daily-driver-0.2.md
  plan/trust-explain-1.3.md
  plan/trust-proof-1.4.md
  history/**
  AUDIT.md

